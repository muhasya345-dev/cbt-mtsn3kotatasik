<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="12" fill="url(#bg)"/>
  <!-- exam paper -->
  <rect x="16" y="12" width="28" height="36" rx="3" fill="#ffffff"/>
  <!-- lines on paper -->
  <rect x="20" y="18" width="20" height="2.4" rx="1.2" fill="#94a3b8"/>
  <rect x="20" y="24" width="16" height="2.4" rx="1.2" fill="#94a3b8"/>
  <rect x="20" y="30" width="20" height="2.4" rx="1.2" fill="#94a3b8"/>
  <!-- green check mark -->
  <path d="M20 40 l4 4 l10 -10" stroke="#059669" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- pencil -->
  <g transform="rotate(45 46 40)">
    <rect x="38" y="37" width="22" height="6" rx="1" fill="#facc15"/>
    <rect x="38" y="37" width="4" height="6" fill="#ef4444"/>
    <polygon points="60,37 66,40 60,43" fill="#1f2937"/>
  </g>
</svg>
